# steam-depot-vfs = { path = "/home/jakob/dev/rust/contrib/steam/steam-depot-vfs/crates/steam-depot-vfs" }

[workspace]
members = [".", "crates/*"]

# needed for the steam-depot-vfs reference
[patch."https://github.com/jakobhellermann/rabex-env"]
rabex-env = { path = "." }
